services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: echocare-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false # User will input this in the Render UI
      - key: MONGODB_DB_NAME
        value: EchoCare
      - key: SECRET_KEY
        generateValue: true # Generates a secure random JWT key automatically
      - key: GEMINI_API_KEY
        sync: false # User will input this in the Render UI
      - key: GOOGLE_CLIENT_ID
        sync: false # User will input this in the Render UI
      - key: FRONTEND_URL
        value: https://echocare-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.10.13

  # 2. Next.js Frontend Web Service
  - type: web
    name: echocare-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://echocare-backend.onrender.com
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false # User will input this in the Render UI
      - key: GEMINI_API_KEY
        sync: false # User will input this in the Render UI
